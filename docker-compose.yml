services:
  app:
    build: .
    container_name: app_financeiro
    restart: always
#    ports:
#      - "8082:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      - APACHE_RUN_USER=#1000
      - APACHE_RUN_GROUP=#1000
      - CI_ENVIRONMENT=production
      - DB_HOST=db
      - DB_DATABASE=financeiro_db
      - DB_USER=admin
      - DB_PASSWORD=admin123
      - LDAP_HOST=ldap://172.16.28.12
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sgrf.rule=Host(`sgrf.ufpa.br`)"
      - "traefik.http.routers.sgrf.entrypoints=web"
      - "traefik.http.routers.sgrf.tls=false"
      - "traefik.http.services.sgrf.loadbalancer.server.port=80"

  db:
    image: mysql:8.0
    container_name: db_financeiro
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financeiro_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    volumes:
      - db_data:/var/lib/mysql
      # Se tiver um arquivo init.sql na raiz do projeto (fora do ngsgpq)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
